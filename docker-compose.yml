version: "3.9"

services:

  # ── PostgreSQL Database ──────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: retailiq_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-retailiq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-retailiq_pass}
      POSTGRES_DB:       ${POSTGRES_DB:-retailiq_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-retailiq}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ──────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: retailiq_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL:   postgresql://${POSTGRES_USER:-retailiq}:${POSTGRES_PASSWORD:-retailiq_pass}@db:5432/${POSTGRES_DB:-retailiq_db}
      SECRET_KEY:     ${SECRET_KEY:-supersecret-change-in-production}
      ENVIRONMENT:    ${ENVIRONMENT:-production}
      LOG_LEVEL:      ${LOG_LEVEL:-INFO}
      LOG_TO_FILE:    "true"
      API_HOST:       "0.0.0.0"
      API_PORT:       "8000"
    volumes:
      - ./datasets:/app/datasets
      - ./saved_models:/app/saved_models
      - ./logs:/app/logs
      - ./reports:/app/reports
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── React Frontend ───────────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: retailiq_frontend
    working_dir: /app
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_URL: "http://localhost:8000"
    depends_on:
      - backend

volumes:
  postgres_data:
